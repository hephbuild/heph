[package]
name = "rheph"
version = "0.1.0"
edition = "2024"

[workspace]
members = ["gen/proto"]

[dependencies]
serde_json = "1.0"
clap = { version = "4.6.0", features = ["derive"] }
slog = "2.7.0"
slog-async = "2.8.0"
slog-term = "2.9.1"
slog-stdlog = "4.1.1"
rheph-proto-gen = { path = "gen/proto", features = ["proto_full"] }
pest = "2.7"
pest_derive = "2.7"
anyhow = "1.0.102"
memoize = "0.6.0"
tokio = { version = "1.50.0", features = ["rt", "rt-multi-thread", "io-util", "io-std", "process", "macros", "sync", "signal", "fs", "test-util"] }
futures = "0.3.32"

[dev-dependencies]
tempfile = "3.10"
