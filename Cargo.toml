[package]
name = "rheph"
version = "0.1.0"
edition = "2024"

[workspace]
members = ["gen/proto", "e2e"]

[dependencies]
serde = { version = "1", features = ["derive"] }
serde_json = "1.0"
chrono = { version = "0.4", features = ["serde"] }
clap = { version = "4.6.0", features = ["derive"] }
slog = "2.7.0"
slog-async = "2.8.0"
slog-term = "2.9.1"
slog-stdlog = "4.1.1"
rheph-proto-gen = { path = "gen/proto", features = ["proto_full"] }
pest = "2.7"
pest_derive = "2.7"
anyhow = "1.0.102"
memoize = "0.6.0"
tokio = { version = "1.50.0", features = ["rt", "rt-multi-thread", "io-util", "io-std", "process", "macros", "sync", "signal", "fs", "test-util"] }
futures = "0.3.32"
async-trait = "0.1.86"
async-recursion = "1"
async-stream = "0.3"
smart-default = "0.7.1"
humantime = "2.3.0"
tokio-util = { version = "0.7.18", features = ["io", "io-util"] }
starlark = "0.13.0"
rayon = "1.12.0"
xxhash-rust = { version = "0.8.15" , features = ["xxh3", "std"]}
itertools = "0.13.0"
tar = "0.4"
glob = "0.3"
walkdir = "2"
tempfile = "3.10"
thiserror = "1.0.69"
derivative = "2.2.0"

[dev-dependencies]
