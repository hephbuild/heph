[package]
name = "walk"
version = "0.1.0"
edition = "2024"

[lints]
workspace = true

[dependencies]
anyhow = "1.0.102"
glob = "0.3"
wax = "0.7"
borsh = { version = "1.6.1", features = ["derive"] }
rusqlite = { version = "0.39", features = ["bundled", "blob"] }
r2d2 = "0.8"
r2d2_sqlite = "0.34"
parking_lot = "0.12"
rustc-hash = "2"
xxhash-rust = { version = "0.8.15", features = ["xxh3", "std"] }
tracing = "0.1"

[dev-dependencies]
tempfile = "3"
