[package]
name = "selfupdate"
version = "0.1.0"
edition = "2024"

[lints]
workspace = true

[dependencies]
hconfig = { package = "config", path = "../config" }
hcore = { package = "core", path = "../core" }
anyhow = "1.0.102"
thiserror = "2.0.18"
tracing = "0.1"
# Blocking HTTP client, used only to download the pinned release binary. rustls
# avoids a system OpenSSL link; blocking runs on its own thread (matches the
# engine's plugin downloader).
reqwest = { version = "0.13", default-features = false, features = ["blocking", "rustls"] }

[target.'cfg(unix)'.dependencies]
libc = "0.2"

[dev-dependencies]
tempfile = "3.27"
