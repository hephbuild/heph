name: CI

on:
  push:
    branches: ["master"]
  pull_request:
    branches: ["master"]

# Cancel superseded runs on a branch/PR so a new push doesn't leave the old run
# burning runners (and showing up as a noisy "cancelled"). master is never
# cancelled — its runs publish releases and must always finish.
concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: ${{ github.ref != 'refs/heads/master' }}

# sccache config shared by every compiling job. RUSTC_WRAPPER=sccache is set by
# the devenv shell; here we pin the cache dir to a workspace path so actions/cache
# can persist it, and disable incremental compilation (sccache cannot cache
# incremental units, and fresh runners have no warm incremental dir to reuse).
env:
  SCCACHE_DIR: ${{ github.workspace }}/.sccache
  SCCACHE_CACHE_SIZE: "2G"
  CARGO_INCREMENTAL: "0"

jobs:
  gen:
    name: Codegen
    runs-on: ubuntu-latest
    timeout-minutes: 10
    outputs:
      version: ${{ steps.version.outputs.version }}
      repo_artifact_id: ${{ steps.upload_repo.outputs.artifact-id }}
    steps:
      - name: Checkout
        uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Setup Nix + devenv
        uses: ./.github/actions/setup-nix

      - name: Compute version
        id: version
        run: |
          VERSION=$(.github/workflows/version.sh "${{github.run_number}}")
          echo "$VERSION"
          echo "version=$VERSION" >> $GITHUB_OUTPUT
          echo "::notice title=Build Version::$VERSION"

      - name: Gen
        shell: devenv shell bash -- -e {0}
        run: gen

      - name: Upload repo
        id: upload_repo
        uses: actions/upload-artifact@v6
        with:
          name: repo
          path: |
            .
            !.devenv/
          include-hidden-files: true

  build:
    name: Build ${{ matrix.os }}/${{ matrix.arch }}
    runs-on: ${{ matrix.runs-on }}
    timeout-minutes: 30
    needs: gen
    strategy:
      fail-fast: false
      matrix:
        include:
          # Linux AMD64 (Native)
          - os: linux
            arch: amd64
            runs-on: ubuntu-latest
            target: x86_64-unknown-linux-gnu

          # Linux ARM64 (Cross-compiled on AMD64 runner)
          - os: linux
            arch: arm64
            runs-on: ubuntu-latest
            target: aarch64-unknown-linux-gnu

          # macOS AMD64 (Intel natively runs on macos-13)
          # This costs money...
#          - os: darwin
#            arch: amd64
#            runs-on: macos-latest-large
#            target: x86_64-apple-darwin

          # macOS ARM64 (Apple Silicon natively runs on macos-latest)
          - os: darwin
            arch: arm64
            runs-on: macos-latest
            target: aarch64-apple-darwin
    steps:
      - name: Download repo
        uses: actions/download-artifact@v7
        with:
          name: repo
          path: .

      - name: Setup Nix + devenv
        uses: ./.github/actions/setup-nix
        with:
          cargo-target: ${{ matrix.target }}

      - name: Build
        id: build
        shell: devenv shell bash -- -e {0}
        env:
          CARGO_TARGET_DIR: "./target"
          BIN_NAME: "heph_${{ matrix.os }}_${{ matrix.arch }}"
          HEPH_BUILD_VERSION: "${{needs.gen.outputs.version}}"
        run: |
          # Go plugin cdylib carries its native extension (.so on Linux, .dylib on
          # macOS); the distribution manifest records each artifact's URL
          # explicitly, so no uniform suffix is needed.
          if [ "${{ matrix.os }}" = "darwin" ]; then ext=dylib; else ext=so; fi
          PLUGIN_GO_NAME="heph-go-plugin_${{ matrix.os }}_${{ matrix.arch }}.$ext"
          echo "bin_name=$BIN_NAME" >> $GITHUB_OUTPUT
          echo "plugin_go_name=$PLUGIN_GO_NAME" >> $GITHUB_OUTPUT
          OUT="$CARGO_TARGET_DIR/${{ matrix.target }}/release"
          # FUSE (default feature) on Linux is pure-Rust (no libfuse link), so
          # zigbuild cross-compiles cleanly. On macOS it links libfuse via the
          # devenv macfuse-stubs; zig mangles the nix `-L` path under its SDK
          # syslibroot and fails to find `-lfuse`, so the (native arm64) macOS
          # runner uses plain `cargo build` — no cross needed there. The go plugin
          # cdylib builds in a second invocation: `--bin heph` is a target filter
          # that would exclude the cdylib's lib target, so it can't share the bin's
          # command. The compile is still shared (deps are already built).
          if [ "${{ matrix.os }}" = "darwin" ]; then
            cargo build --release --locked --target ${{ matrix.target }} -p heph --bin heph
            cargo build --release --locked --target ${{ matrix.target }} -p plugin-go-cdylib
            lib="$OUT/libplugin_go_cdylib.dylib"
            # The nix toolchain hard-links libiconv against its /nix/store path,
            # which is absent on user machines (dyld aborts at launch). Rewrite
            # those load commands to the OS /usr/lib copies — for both artifacts.
            bash scripts/macos-portable.sh "$OUT/heph"
            bash scripts/macos-portable.sh "$lib"
          else
            cargo zigbuild --release --locked --target ${{ matrix.target }} -p heph --bin heph
            cargo zigbuild --release --locked --target ${{ matrix.target }} -p plugin-go-cdylib
            lib="$OUT/libplugin_go_cdylib.so"
          fi
          cp "$OUT/heph" $BIN_NAME
          cp "$lib" $PLUGIN_GO_NAME

      - name: sccache stats
        if: always()
        shell: devenv shell bash -- -e {0}
        run: sccache --show-stats

      # macFUSE is NOT installed on this runner. libfuse is weak-linked, so the
      # binary must still launch — this proves the shipped macOS artifact runs
      # on machines without macFUSE (dyld would abort here if it were hard-linked).
      - name: Smoke test launch (darwin)
        if: matrix.os == 'darwin'
        run: ./$BIN_NAME version
        env:
          BIN_NAME: "heph_${{ matrix.os }}_${{ matrix.arch }}"

      - name: Upload artifact
        uses: actions/upload-artifact@v6
        with:
          name: ${{steps.build.outputs.bin_name}}
          path: ${{steps.build.outputs.bin_name}}

      - name: Upload go plugin artifact
        uses: actions/upload-artifact@v6
        with:
          name: ${{steps.build.outputs.plugin_go_name}}
          path: ${{steps.build.outputs.plugin_go_name}}

  upload_artifacts:
    name: Pre-release
    needs: [gen, build]
    if: always() && needs.gen.result == 'success'
    runs-on: ubuntu-latest
    timeout-minutes: 10
    outputs:
      release_url: ${{ steps.create_release.outputs.url }}
    steps:
      # Checkout brings tools/pluginmanifest (the manifest generator); the built
      # artifacts download into dist/ alongside it.
      - name: Checkout
        uses: actions/checkout@v6
      - uses: actions/setup-go@v5
        with:
          go-version: "1.25"

      - name: Download all artifacts
        uses: actions/download-artifact@v7
        with:
          # Matches the CLI (`heph_<os>_<arch>`) and the go plugin cdylib
          # (`heph-go-plugin_<os>_<arch>.{so,dylib}`); excludes the `repo` source artifact.
          pattern: "heph*"
          path: dist
          merge-multiple: true

      - name: List artifacts
        run: ls -lahR dist

      # Build the go plugin distribution manifest from the per-os/arch cdylibs in
      # dist/ — one entry per artifact, its `url` the release-asset URL it's
      # published alongside (so `plugins: - { identifier: { url: .../heph-go-plugin.json } }`
      # resolves the right dylib for the host). Each entry carries the artifact's
      # `sha256:` checksum; a `<manifest>.sha256` sidecar (published too) holds the
      # manifest's own checksum for consumers to pin as `plugins[].checksum`.
      # JSON via tools/pluginmanifest.
      - name: Generate go plugin manifest
        run: |
          VERSION="${{needs.gen.outputs.version}}"
          BASE="https://github.com/hephbuild/heph-artifacts-v1/releases/download/$VERSION"
          ( cd tools/pluginmanifest && go run . -name go -version "$VERSION" \
              -prefix heph-go-plugin -from-dir "$GITHUB_WORKSPACE/dist" -url-base "$BASE" \
              -out "$GITHUB_WORKSPACE/dist/heph-go-plugin.json" )
          cat dist/heph-go-plugin.json
          echo "manifest checksum: $(cat dist/heph-go-plugin.json.sha256)"

      - name: Create Release in artifacts repo
        id: create_release
        uses: softprops/action-gh-release@v3
        with:
          repository: hephbuild/heph-artifacts-v1
          token: ${{ secrets.HEPH_ARTIFACTS_PAT }}
          tag_name: ${{needs.gen.outputs.version}}
          name: Build ${{needs.gen.outputs.version}}
          body: "Artifacts automatically published from source-repo (rust)."
          draft: false
          prerelease: true
          files: dist/*

  abi:
    name: ABI guard
    # PR-only: it diffs the branch against the PR base. Pure git + bash, so it
    # skips the devenv toolchain and runs in seconds.
    if: github.event_name == 'pull_request'
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - name: Checkout
        uses: actions/checkout@v6
        with:
          # Full history so merge-base with the PR base resolves.
          fetch-depth: 0
      - name: Check plugin ABI version
        run: scripts/abi-check.sh "origin/${{ github.base_ref }}"

  lint:
    name: Lint
    runs-on: ubuntu-latest
    timeout-minutes: 15
    needs: gen
    steps:
      - name: Download repo
        uses: actions/download-artifact@v7
        with:
          name: repo
          path: .

      - name: Setup Nix + devenv
        uses: ./.github/actions/setup-nix
        with:
          cargo-target: x86_64-unknown-linux-gnu

      - name: Lint
        shell: devenv shell bash -- -e {0}
        run: lint

      - name: sccache stats
        if: always()
        shell: devenv shell bash -- -e {0}
        run: sccache --show-stats

  test:
    name: Test ${{ matrix.os }}/${{ matrix.arch }}
    runs-on: ${{ matrix.runs-on }}
    timeout-minutes: 30
    needs: gen
    strategy:
      fail-fast: false
      matrix:
        include:
          # Linux AMD64 (Native)
          - os: linux
            arch: amd64
            runs-on: ubuntu-latest
            target: x86_64-unknown-linux-gnu

          # macOS ARM64 (Apple Silicon natively runs on macos-latest)
          - os: darwin
            arch: arm64
            runs-on: macos-latest
            target: aarch64-apple-darwin
    steps:
      - name: Download repo
        uses: actions/download-artifact@v7
        with:
          name: repo
          path: .

      - name: Setup Nix + devenv
        uses: ./.github/actions/setup-nix
        with:
          cargo-target: ${{ matrix.target }}
          cache-suffix: "-test"

      # No macFUSE on the runner: the macOS binaries weak-link libfuse, so they
      # launch with the dylib absent. `support_check` finds no macfuse.fs and
      # reports Unavailable, so FUSE mount tests skip. Linux exercises the real
      # pure-Rust FUSE path.
      - name: Test
        shell: devenv shell bash -- -e {0}
        env:
          RUST_BACKTRACE: "1"
        run: tst

      - name: sccache stats
        if: always()
        shell: devenv shell bash -- -e {0}
        run: sccache --show-stats

  release:
    name: Release
    needs: [gen, upload_artifacts, lint, test]
    if: github.ref == 'refs/heads/master'
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - name: Update Release to Production
        uses: softprops/action-gh-release@v3
        with:
          repository: hephbuild/heph-artifacts-v1
          token: ${{ secrets.HEPH_ARTIFACTS_PAT }}
          tag_name: ${{needs.gen.outputs.version}}
          prerelease: false
          make_latest: true

      - name: Trigger Deploy on hephbuild.github.io
        uses: actions/github-script@v8
        with:
          github-token: ${{ secrets.HEPH_ARTIFACTS_PAT }}
          script: |
            await github.rest.actions.createWorkflowDispatch({
              owner: 'hephbuild',
              repo: 'hephbuild.github.io',
              workflow_id: 'deploy.yml',
              ref: 'main',
              inputs: {
                version: '${{ needs.gen.outputs.version }}',
              },
            });

  summary:
    name: Summary
    needs: [gen, upload_artifacts]
    if: always()
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - name: Generate summary
        run: |
          echo "# Build Summary" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "**Version:** \`${{needs.gen.outputs.version}}\`" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          if [ "${{ needs.upload_artifacts.result }}" == "success" ]; then
            echo "**Release:** [${{needs.gen.outputs.version}}](${{needs.upload_artifacts.outputs.release_url}})" >> $GITHUB_STEP_SUMMARY
          elif [ "${{ needs.upload_artifacts.result }}" == "skipped" ]; then
            echo "**Release:** Skipped" >> $GITHUB_STEP_SUMMARY
          else
            echo "**Release:** Failed or cancelled" >> $GITHUB_STEP_SUMMARY
          fi

  cleanup:
    name: Cleanup
    needs: [gen, build, lint, test, upload_artifacts]
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - name: Delete Repo Artifact
        uses: actions/github-script@v8
        with:
          script: |
            github.rest.actions.deleteArtifact({
              owner: context.repo.owner,
              repo: context.repo.repo,
              artifact_id: "${{ needs.gen.outputs.repo_artifact_id }}",
            });
