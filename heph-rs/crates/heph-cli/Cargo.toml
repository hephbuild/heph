[package]
name = "heph-cli"
version.workspace = true
edition.workspace = true
license.workspace = true
repository.workspace = true

[[bin]]
name = "heph"
path = "src/main.rs"

[dependencies]
thiserror.workspace = true
clap = { version = "4.5", features = ["derive", "cargo"] }
colored = "2.1"
serde = { version = "1.0", features = ["derive"] }
serde_json = "1.0"
anyhow = "1.0"
num_cpus = "1.16"

# Workspace dependencies
heph = { path = "../heph" }
heph-dag = { path = "../heph-dag" }
heph-engine = { path = "../heph-engine" }
heph-cache = { path = "../heph-cache" }
heph-tref = { path = "../heph-tref" }

[dev-dependencies]
tempfile = "3.8"
assert_cmd = "2.0"
predicates = "3.1"
