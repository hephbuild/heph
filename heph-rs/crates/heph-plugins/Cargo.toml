[package]
name = "heph-plugins"
version.workspace = true
edition.workspace = true
license.workspace = true
repository.workspace = true

[dependencies]
async-trait = "0.1"
serde = { version = "1.0", features = ["derive"] }
serde_json = "1.0"
thiserror.workspace = true
tokio = { version = "1.0", features = ["rt", "process", "io-util", "fs"] }

[dev-dependencies]
tokio = { version = "1.0", features = ["rt", "process", "io-util", "fs", "macros", "rt-multi-thread"] }
tempfile = "3.8"
